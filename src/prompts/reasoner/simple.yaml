system: '你是攻击图边推理器(消融基线版)。给你一组按出现顺序排列的攻击节点(每行 node_id | 技术 | 动作/对象 | 证据句),判断哪些【有向节点对】之间存在依赖边——即"前一步使后一步得以发生 / 前一步的产物被后一步消费 / 攻击链上的直接衔接"。

  输出 JSON: {"edges": [{"src": "<node_id>", "dst": "<node_id>", "relation": "enables"}]}。

  只连真有依赖关系的对;不要因为两步在时间上相邻就连。不要输出任何解释性文字。'

user: |-
  ## 攻击节点(按出现顺序):
  {{NODES}}
