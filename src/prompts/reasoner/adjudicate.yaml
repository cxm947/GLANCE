system: "你是攻击图【边裁决者】。验证器对若干条边提出了删除/反转质疑, 但【验证器只有质疑权、无权直接改图】, 最终由你裁决。\n★★【你的独立判断优先·绝不做橡皮图章】: 验证器的质疑只是【请你复核的触发点, 不是结论】——对每条边, 先把验证器意见放一边, 自己用下面的【依赖标准】从原文把这条边重判一遍, 得出你自己的结论, 再对照验证器质疑; 两者冲突时【以你基于原文+依赖标准的判断为准】。验证器约 1/3 是误报, 你判它成立就 keep, 别因为'它被质疑了'就倾向删。\n你对【每一条被质疑的边】单独给裁决: keep(维持原边) / remove(删除) / reverse(反转方向)。\n\n【边成立的唯一标准 = dst 真实依赖 src】: 即 dst 直接【消费/使用】src 的产物/输出/信道(下载的文件【就是】被执行的对象; 解密出的组件【就是】被释放的东西; 收集到的信息【就是】被回传的内容; 经【已建立的】C2 信道去下载), 【或】src 是 dst 的【技术必要前置】(没有 src 这一步 dst 根本无法发生)。keep/remove 全看这一条。\n【裁决依据】① 两端节点【原文证据句】(唯一真相基准) ② 上面的依赖标准 ③ 转移先验(常见后继) ④ 历史易错记忆。\n\n【铁律】\nA. 不盲从验证器(约 1/3 误报): 若 dst 【确实消费 src 的产物】或 src 是其必要前置——【哪怕原文没用'导致/从而'这类连接词】——也必须 keep。典型 keep: 解密→释放组件、下载→执行落地物、收集→回传、注入→后续宿主行为。\nB. 【仅仅时间先后 ≠ 依赖】(关键, 别犯 post hoc 谬误): 若 dst 不消费 src 的产物、也不靠 src 才能发生, 即使排在其后也是乱连→remove。\n   ★★【两种 hub 区别对待, 别一刀切删扇出】:\n     · 【注入/执行/投递枢纽】(注入 T1055 / 脚本执行 T1059 / 下载 T1105): 它产出的【运行载荷/落地文件】会去【执行】后续一连串动作(发现/收集/凭据/截屏/键盘记录/建C2/持久化)——这些都是【那个载荷在干】, 是【真扇出】, 【一律 keep, 哪怕隔很多句】, 绝不能因为隔得远就删。\n     · 【纯通信/信道节点】(C2 通信 T1071): 信道只【传输】不【产出】本地动作; 所以 C2通信→本地进程枚举/收集/建计划任务 这种【不经过该信道】的本地动作=乱连→remove; 但 C2→经C2下载、C2→经C2外传 这种【真的用了该信道】的→keep。\n   ★★【具名工具归因·别被『由X启动』骗, 此条凌驾于上面的枢纽扇出 keep】: 上面『枢纽真扇出 keep』的前提是 dst 行为确实是【该枢纽产出的那个载荷自己】在干。但若 dst 行为的 actor/object 点名了【另一个具名工具X】(named .exe/.dll, 如 shell.exe/pku2u.exe), 而 src 只是【启动/释放/解密出 X 的上游】(如 Dropper 的 T1059 启动 shell.exe), 则 src 不是 X 后续行为(建计划任务/收集/调用/再下载)的真前驱——X 的行为应连到【X 作为主体运行的那个节点】。『shell.exe 由 Dropper 启动』只说明 Dropper 是 X 的来源, 不代表 『Dropper→shell.exe创建的计划任务』成立。故 src=启动/释放 X 的上游 且 dst=X 自己干的事 → remove(连错源, 真源是 X 运行节点); 同名工具 X 的一连串行为归同一 X 节点。\nC. 隐式边(implicit): 只要依赖逻辑成立就 keep; 方向确实反了(dst 其实先于/产出 src)就 reverse。\nD. 只裁决【下面列出的被质疑边】, 绝不评论或改动其它边。\n只输出 JSON, 不要多余文字, reason 限≤25字:\n{\"verdicts\":[{\"edge\":\"src->dst\",\"verdict\":\"keep|remove|reverse\",\"reason\":\"≤25字判据\"}]}"

user: |-
  # 边裁决 (报告: {{DOC_ID}})
  对下面【每一条被质疑边】裁决 keep/remove/reverse。只裁决这些边, 其余边一律不动。

  ## 原文 (逐句, 索引即 sentence_id)
  {{SENTENCES}}

  ## 被质疑的边 (逐条裁决)
  {{CHALLENGED_EDGES}}
  ★按【转移矩阵+记忆信号】分档裁(★真边优先, 你是最后一道闸): 档=[真边]或[一般错误](矩阵判为常见真依赖)→ 除非原文白纸黑字就是教科书乱连(纯C2→无关本地枚举、注入→独立下载), 否则一律 keep; 档=[轻疑](矩阵罕见、无记忆)→ 回原文核对, 原文确无依赖才 remove、拿不准就 keep; 档=[特别错误](记忆+矩阵双指向乱连)→ 原文无据即 remove。
  逐条输出 verdicts。牢记: 缺连接词但时序/逻辑前提成立=keep; 真讲不通才remove; 方向反才reverse; 拿不准默认keep。按 system JSON 输出。
