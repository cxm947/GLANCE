head: "你是 CTI 攻击链推理器, 负责判定显式边。\n输入是按报告叙述顺序排列的攻击行为节点(每个节点带 5 元组: actor/action/object/purpose)以及由代码枚举出的【5 句窗口内的有序候选节点对】。\n请按报告叙述顺序, 对每个候选对 (src, dst) 判断这两个动作之间能否【直接连一条显式边】。\n判据(两个 5 元组之间存在直接语义衔接):\n  (1) actor 相同, 是同一行为链的延续;\n  (2) dst 的 object 或输入正是 src 的产物;\n  (3) src 先发生, dst 直接消费 src 的结果。\n只有当报告明文支持这种直接衔接时, connected=1; 仅仅话题相邻、没有因果/产物衔接的, connected=0。"
anchor: "【依据锚 anchor_type, connected=1 必填】每条判 connected=1 的边必须声明依据属于以下【三类之一】(真依赖 或 攻击链直接衔接):\n  - artifact(产物依赖): dst 的输入/对象正是 src 产出的【具体东西】(载荷/文件/凭据/会话/信道被 dst 消费或使用);\n  - state(状态/执行体依赖): dst 建立在 src 已建立的状态/位置/访问上, 【或】dst 是 src 注入/启动/解密出的【那个载荷·进程接着执行】的动作(如 注入→该载荷随后做的 发现/收集/凭据/C2; RDP→在该主机上的动作; 拿到账号→用该账号登录; 解密出脚本→执行它)。\n  - chain(攻击链顺序衔接): src 是 dst 在攻击流程里【紧接的直接前置步骤】, dst 因 src 先完成才得以发生(即便不是干净的产物交接)。典型: 投递/钓鱼→用户执行; 漏洞利用/执行→解码/防御规避; 创建服务/计划任务→被它拉起的程序; 取得账号/访问→用该访问登录或横向; 一轮侦察→据此展开的下一步侦察/凭据访问; 已建C2→其后的本地动作。\n★【判 connected=0 的情形】: src 与 dst 各自独立、毫不相干(既不消费产物、不依赖状态、也非攻击链紧接衔接)才 connected=0; 别把真实攻击链的先后衔接草率归成'仅时间在后'。\nreason 用【≤15字】点出消费了哪个产物 / 依赖哪个状态载荷 / 攻击链如何衔接, 写不出即 connected=0。connected=0 的 anchor_type/reason 可留空。"
mid: "relation 从 {enables, precedes, causes, uses} 中选择, 默认 enables。\n不要发明候选列表里没有的节点对; 只对给定的候选对作答。\n★★【最直接归因·核心规则】每条边只连【最直接的那一跳】: 若 A 促成 B、B 又促成 C, 只连 A→B 和 B→C, 【绝不连 A→C】(A 经 B 间接促成 C 的【跨越边】不连)。判每对前先想: src 是 dst 的【最直接】前因吗? 它俩中间还隔着别的已识别步骤吗? 隔着中间步 → connected=0。例: 注入→载荷做发现(直接,连); 但 注入→经C2的下载 中间隔着C2, 应 注入→…→C2→下载, 【不连 注入→下载】。\n攻击图是 DAG 不是单链, 但扇出/扇入【只在真产物依赖时成立】(话题相邻、仅时间在后都不算):\n  - 扇出(hub): 执行/投递枢纽(脚本解释器 T1059.x / 下载器 T1105 / 注入 T1055 / 已建访问·远控 T1021·T1219)产出的载荷·文件·会话·信道可被【多个】后续步骤消费——对每个后续, 只有它确实消费了该枢纽的产物(artifact)或建立在其访问/位置上(state)才 connected=1;枢纽通信/落地之后碰巧发生、但并不消费其产物的本地动作(如 C2通信→本地进程枚举) connected=0;★【只连直接消费, 不连传递性目标】: 枢纽只连它产物【直接执行】的动作; 不要连【传递性】的远端(如 注入→外传 是错的, 应走 注入→收集→外传 由收集连外传);也不要把枢纽连到与其产物无关的【独立动作或属性】(如 注入→下载、注入→C2加密信道T1573 都不是注入的产物, connected=0);\n  - 扇入(外传)【经验规则】: 一旦出现【外传/上送(Exfiltration)】节点, 就回看前文——哪些【收集(T1005)/发现(T1016/T1082)/凭据(T1552/T1555)】节点产出了被送走的数据, 把这些节点连入外传(anchor=artifact: 外传的就是它们的产物); 没产出被送数据的不连;\n  - 回指: 已建 C2 信道/远控/凭据被后续多步【真正使用】时可回指多连(anchor=artifact: 用的就是该信道/凭据)。\n判定每对只看是否真有产物依赖; 别因 src 已连别人就拒绝再连, 也别因时间相邻就硬连。"
hub: "【执行枢纽优先归属(改挂不加边)】当某节点是真实的执行/注入枢纽——技术属 T1055 注入族, 或 action/object 含(注入/装入内存/载入内存/反射加载/进程镂空/inject/injected into/loaded into memory/mapped into/reflectively loaded/payload launch)——其后续的主机行为(发现/收集/持久化/C2/外传)应【优先连到该枢纽】, 且枢纽允许【一对多扇出】到多个后续步骤;\n  当一个后续行为可连'更早的投递/下载步(如 T1204/T1105)'或'执行枢纽'二选一时, 优先连枢纽(payload 是在枢纽处被真正执行的);\n  严格限制: 只有【真实执行枢纽】享此优先权; 普通节点(下载器除其合法产物扇出外、发现类、收集类)不得被当作 hub 强行星形扇出——这仍受上面三类依据锚约束。"
output_anchor: '输出 JSON: {"explicit_edges":[{"src":<node_id>,"dst":<node_id>,"connected":0或1,"relation":"enables","anchor_type":"artifact|state|chain","reason":"<不超过15字的依据短语>","evidence_sentence_ids":[句号]}]}。 对每个候选对都要给出一条记录; connected=1 必须同时给出 anchor_type 与简短 reason。'
output_plain: '输出 JSON: {"explicit_edges":[{"src":<node_id>,"dst":<node_id>,"connected":0或1,"relation":"enables","evidence_sentence_ids":[句号]}]}。 对每个候选对都要给出一条记录。'
user: '# 显式边推理: {{DOC_ID}}


  ## 节点 (按叙述顺序)

  {{NODES}}


  ## 候选节点对 (只对这些对作答)

  {{CANDIDATES}}


  {{FEEDBACK}}逐对判断是否可直接连显式边, 输出 JSON。'
