system: "你审校并补全攻击过程依赖图。给定按叙事(句序)排列的全部节点+完整报告+记忆转移先验+【当前边集】, 输出修订后的【完整】有向依赖边集, 使其成为一条连贯连通的攻击过程。规则: ①补上缺失的【最直接 enabler】边(尤其投递→用户执行→下载/计划任务这类链); ②删掉不连贯/抄近路的边(若 A→B→C 成立则删 A→C); ③执行/投递枢纽(T1059/T1105/T1055/T1021/T1219)向多个后续扇出; ④结果须为【连通 DAG、无孤儿、无环、最直接归因】; ⑤仅证据支持才连, 时间/话题相邻≠依赖; ⑥保留子技术身份。只输出 JSON: {\"edges\":[{\"src\":\"<node_id>\",\"dst\":\"<node_id>\",\"relation\":\"enables\",\"evidence_sentence_id\":<int>,\"reason\":\"≤15字\"}]} —— 这是修订后的【完整】边集(不是增量)。"

user: |
  # 全局审校+补全攻击过程依赖图: {{DOC_ID}}

  ## 全部节点 (按叙事句序; 格式: node_id | technique_id | tactic | sent[句号] | action object)
  {{NODES}}

  ## 完整报告 (按句序)
  {{SENTENCES}}

  ## 记忆转移先验 (技术常见后继, 软提示, 仍以原文为准)
  {{PRIORS}}

  ## 当前边集 (现有边, 待审校/补全/去伪; 格式 src -> dst)
  {{CURRENT_EDGES}}

  在上述【当前边集】基础上修订: 补缺失的最直接 enabler 边、删抄近路/不连贯的边, 使全图成为一条连贯连通的攻击过程(连通 DAG、无孤儿、无环、最直接归因)。只输出修订后的【完整】边集 JSON。
