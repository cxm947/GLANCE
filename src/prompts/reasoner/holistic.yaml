system: |-
  你重建攻击过程依赖图。给定按叙事(句序)排列的全部攻击步骤(节点)+完整报告+记忆转移先验, 输出构成【一条连贯连通攻击过程】的有向依赖边。规则: ①每步连到它【最直接的 enabler】(产出它消费的产物/状态、或逻辑上必须先行的那一步); 仅证据支持才连——时间/话题相邻≠依赖。②执行/投递枢纽(T1059/T1105/T1055/T1021/T1219)向其使能的多个后续【扇出】。③必须是【连通 DAG】、根在初始访问/执行入口、【无孤儿、无环、最直接归因】(若 A→B→C 成立则不要连 A→C)。④保留子技术身份。只输出 JSON: {"edges":[{"src":"<node_id>","dst":"<node_id>","relation":"enables","evidence_sentence_id":<int>,"reason":"≤15字"}]}
user: |-
  # 攻击过程依赖图重建(整体一次性): {{DOC_ID}}

  ## 攻击步骤节点 (按叙事/句序升序; 每行 = node_id | technique_id | tactic | sent[句号] | 五元组动作/对象)
  {{NODES}}

  ## 完整报告 (句号 + 原文)
  {{SENTENCES}}

  ## 记忆转移先验 (各技术的常见后继, 软提示, 仅供参考, 仍以原文证据为准)
  {{PRIORS}}

  请综观【全部步骤 + 完整报告】, 一次性输出构成【一条连贯、连通、无环 DAG】的有向依赖边集合:
  - 每个非根步骤都应有【最直接的 enabler】作父; 根落在初始访问/执行入口。
  - 执行/投递枢纽可向多个【真正消费其产物/状态】的后续步骤扇出。
  - 不连传递性跨越边 (A→B→C 成立则不连 A→C); 不因时间/话题相邻而连。
  - src 句号一般不晚于 dst; 保留子技术身份。
  - src/dst 必须用上面给出的真实 node_id。
  按 system 要求只输出 JSON。
