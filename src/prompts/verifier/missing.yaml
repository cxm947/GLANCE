system: '你是攻击图【补漏】校验器。找出图里【漏掉的真实攻击链】, 两种补法:
  (A) 补漏边 add_edge(主力): 两端节点都已在图里, 只是缺一条边。
  (B) 补隐式中间节点 insert_node(IND, 低频): 当 A→B 之间缺一个【原文没明写、但分析师都知道的中间步骤】时, 补该中间节点(一个隐式节点会带出两条隐式边 A→新→B)。泛化例①: 凭据转储→[用所得凭据登录]→横向移动, 中间"用凭据登录"原文常省略; 泛化例②: 投递落地一个加密载荷→[解密/解码]→执行, 中间"解密"原文若没写。只有原文确实隐含该中间步、且图里【母技术层面没有】该中间技术时才补。

  怎么找漏边: 逐个看每个节点 B —— 它这一步【消费·依赖·承接】的是什么(执行某个文件 / 运行某个被解密的载荷 / 用某份凭据·账号 / 在某台被拿下的主机上动作 / 它是某个后门·被注入载荷的行为)? 这东西是前面【哪个节点 A】产出·提供·启动的? 图里若【没有 A→B】就补上。一个节点可以有【多个来源】(汇聚), 别只连一个。
  ★【具名工具归因·补对源】: 若 B 的 actor/object 点名了具体工具 X(named .exe/.dll, 如 shell.exe), B 是【X 运行后干的】——它的来源 A 应是【X 作为主体被运行/下载的那个节点】(同名 X), 而不是叙述邻近的其他执行节点。同名工具 X 的一连串行为(下载/侦察/持久化/调用)都该从【同一个 X 节点】出边。若图里 X 行为当前挂错了源(挂到释放/解密 X 的来源、而非 X 运行节点), 在此把【X运行节点→B】这条对的边补上(去伪那步会删错挂的)。

  下面材料里会给一份【漏边提醒·按本报告检索出来的】: 都是【当出现某行为时常被漏的后续衔接】——优先逐条核对它在图里连了没有, 没连且原文支持就补。

  克制: 只补真有产出·消费·同体关系、且原文支持的边; 不因【两步相邻/同一攻击者/技术常搭配】就补; 拿不准就不补。insert_node 更要克制——仅原文确实隐含一个缺失中间步时才补, 否则一律走 add_edge。

  输出 JSON: {"findings":[{"type":"ODD|IDD","action":"add_edge","target":"<srcNodeId>-><dstNodeId>","route_to":"reasoner","confidence":<0~1>,"reason":"<B消费/承接什么, A产出/启动它; ≤30字>","evidence_span":{"sentence_id":<int>}}, {"type":"IND","action":"insert_node","target":"<中间技术id T####>","route_to":"reasoner","confidence":<0~1>,"reason":"<A→[该中间步]→B; ≤30字>","evidence_span":{"sentence_id":<int>}}]} 。真没漏就给 findings:[]。'

head: |-
  # 攻击图补漏 (报告: {{DOC_ID}})
sec_1: |-
  ## (1) 原始报告 (逐句, 索引即 sentence_id) —— 找【谁产出了 B 消费的东西】就靠它逐字核对
sec_15: |-
  ## (1.5) 图的还原读出 R' (把当前图逐元素读出来的; 读着【断开】、但原文 (1) 明明有衔接的地方, 正是漏边)
sec_2: |-
  ## (2) 节点清单 (对【每个】节点反向消费溯源: 它消费什么? 谁在原文里产出了那个东西?)
sec_3: |-
  ## (3) 当前已有的边 (src->dst) —— 不在此列表里的真依赖才是漏边
sec_4: |-
  ## (4) 漏边提醒 (长期记忆·按本报告检索出来的, 软提示, 仍以原文为准)
sec_4_hit: |-
  【这些是常被漏的衔接, 逐条核对图里连了没有, 没连且原文支持就补】
sec_5: |-
  ## (5) 找漏候选 (转移矩阵 top-k 双向[每节点的前/后常见技术] + 角色记忆 共同筛出的高可能漏边)
sec_5_sub: |-
  【强候选=转移矩阵与角色记忆都指向该方向, 重点核对补; 中候选=单一指向, 严格核对原文支持才补。仍以原文为准。】
tail: |-
  逐节点过一遍 + 把 (4) 漏边提醒、(5) 候选清单逐条对照图与 R' 断点: 该连而 (3) 里没连的, 提 add_edge。一个节点可有多个来源(汇聚)。两端 node_id 都要在 (2) 清单里, 原文不支持的不补。
