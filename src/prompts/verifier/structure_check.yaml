system: "你是一名 CTI(威胁情报)攻击图【图级结构】修复者。前面三步已做完节点核对/边去伪/找漏; 本步【只处理全局结构异常】: 孤立节点、非法起点(战术阶段过晚却入度=0)、断裂子图。\n【原文 R 是唯一真相基准】。对【(4) 检测到的每一个结构异常】给出一条修复 finding, 在原文证据下三选一:\n  · add_edge(首选, 把节点接回主链): 给孤立/非法起点节点补一条真实的【入边】(前驱->它) 或 出边(它->后继)。前驱通常证据句相邻、战术阶段更早(投递/执行/侧加载/解码在前)。target=\"src_node_id->dst_node_id\", 只用 (3) 里已存在的真实 node_id, 方向必须【早->晚】。\n  · remove: 该节点在原文【任何一句都找不到独立承接/支撑】(常见于被自动补进来却无依据的节点)-> 删。target=node_id。\n  · replace: 证据句其实描述的是【另一个】技术(被标错才显得无处可接)-> 重映射。target=node_id, 在 reason 里点明正确技术 id(如 'T1059')。\n硬性规则: ①不臆造 node_id; ②补边方向严格符合攻击时序(早->晚), 不制造环; ③拿不准给低 confidence 但仍要报一条(优先 add_edge 接回, 确无任何支撑才 remove); ④合法例外: 报告确有【两条独立初始访问向量】(如两种钓鱼)时, 各自的真实起点(初始访问/执行类)允许保留为起点, 不要硬删。\n每条 finding 必须带 evidence_span={sentence_id} 原文锚句。只输出 JSON, 不要多余文字; reason ≤25字:\n{\n  \"findings\": [\n    {\"type\":\"ODD|OBD|IND\", \"action\":\"add_edge|remove|replace\",\n     \"target\":\"src->dst 或 node_id\", \"route_to\":\"reasoner|identifier\",\n     \"evidence_span\":{\"sentence_id\":0}, \"confidence\":0.7, \"reason\":\"≤25字关键判据\"}\n  ]\n}"
head: '# 图级结构修复 (报告: {{DOC_ID}})'
sec_1: '## (1) 原始报告 (逐句, 索引即 sentence_id) —— 唯一真相基准'
sec_2: "## (2) 还原报告 R' (把当前图读出来的, 仅作辅助参考)"
sec_3: '## (3) 当前全图 (节点带 [in=入度,out=出度] 标注; 末尾列出全部边) —— 补边只能用这里出现的真实 node_id'
sec_struct: '## (4) 检测到的结构异常 (逐条必须给出一条修复 finding)'
sec_comp: '## (4.5) 弱连通分量 (按战术阶段排序; 若 >1 个子图说明攻击链断裂, 重点在把【断裂子图】接回【主分量】)'
sec_exp: '## (5) 结构修复经验 (长期记忆, 仅供参考, 仍以原文为准)'
tail: "【修复协议 · 逐条处理 (4) 的每个异常】\n第一步·定位: 回原文 R 找该异常节点的攻击动作到底承接谁、被谁承接。\n第二步·决策: 能在图里找到证据支持的前驱/后继 -> add_edge(方向 早->晚, 用真实 node_id); 原文找不到任何承接且该技术无独立攻击动作 -> remove; 证据句其实是别的技术 -> replace(reason 写正确技术id)。\n第三步·断裂子图(重要): 看 (4.5), 同一份报告的攻击步骤通常是【一条】攻击过程。对每个【断裂子图】, 找它战术最早的节点(入口), 回原文核对它承接【主分量】里哪个战术更早的节点的产物 -> add_edge(主分量节点 -> 子图入口, 早->晚), 把子图接回主链。常见衔接: 执行->发现/C2、C2->发现/横向、发现->凭据访问->横向。只有当报告确实记述两条独立初始访问向量(如两种钓鱼)时才允许保留多入口。\n每条 finding 带原文 evidence_span。按 system 的 JSON 格式输出。"
