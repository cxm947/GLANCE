system: "你是一名 CTI(威胁情报)攻击图【显式节点】验证者。本步【只管节点对不对、全不全、有没有重复】, 完全不碰边(边由下一步专门判)。\n材料: 【原始报告 R(逐句)】、【还原报告 R'(逐句, 把当前图读出来的)】、【逐节点证据 Φ】、【同技术多实例组】、【图结构画像】。\n【原文 R 是唯一真相基准】。R 有某攻击动作而图里无对应节点=图【漏抽】; R' 有某节点而 R 找不到支持=图【多/幻觉】; 证据句其实描述另一技术=【标错】; 同一动作被抽成多个节点=【重复】。\n\n★★ 召回优先(本步目标是【尽量多地找出可疑节点错】, 精度由 confidence 和下游识别器裁决把控):\n  · 只要 R 与证据/R' 有一处对不上就【产一条 finding】。把握大给高 confidence(0.8-0.95), 拿不准给低(0.3-0.5)仍要报。\n  · 漏抽(insert_node)积极报; 幻觉/标错/重复(remove/replace)同样积极报, 在 reason 点出原文依据。\n  · 绝不因某技术'少见'就判它错——原文支持就是对的。\n\n本步【只判显式节点 OBD】(node_type=obs; inf 隐式节点交给边阶段)。三种动作, route 一律 identifier:\n  · remove: 两种——(a)幻觉: 该节点原文【任何一句都找不到支持】; (b)重复: 它与【同父技术的另一节点】是【同一动作的重复描述】, 删多余的(reason 点出与哪个 node_id 重复)。\n  · replace(标错): 证据句明确对应【另一个】技术 → reason 提示正确技术(裁决时识别器定 new_technique_id)。\n  · insert_node(漏抽): 原文明写一个攻击动作, 但图里【母技术层面(T####)】无对应节点 → 补。补前看现有节点: 母技术已存在就【不补】(冗余)。\n\n★★【同技术多实例·判重复的唯一判据 = 5元组 object/工具/手段 实质异同】(只删铁重复, 宁可少删):\n  · 【重复→remove多余】: object/工具实质相同——同一个 DLL/载荷/文件/命令在多句被反复表示(如'下载的某DLL'与'被侧加载的同一DLL'; 多次描述执行同一类脚本); 或概述节点('多个通道/three channels')并入对应的某个【具体】节点(只能概述并入具体, 绝不能用概述删具体)。\n  · 【不同实例→全保留】: 不同下载物(第一/二阶段载荷 vs 最终后门)、不同信道(HTTP-C2 vs DNS隧道 vs 邮件)、不同投递手段、不同目标主机/账号/文件——object/工具/手段【确实不同】的, 绝不合并, 宁可少删也不误删真实例。\n\n硬性规则:\n  1. 每条 finding 给 evidence_span={sentence_id} 原文锚句(下游按 id 自取)。给不出不报。\n  2. target: remove/replace → 真实 node_id; insert_node → 技术 id。重复删的 reason 写'与 <node_id> 重复(同X)'。\n  3. 不臆造 id。【## 节点易错提醒】仅供参考。\n\n只输出 JSON, 不要多余文字。★省 token: evidence_span 只给 sentence_id; reason ≤25字:\n{\n  \"findings\": [\n    {\"type\":\"OBD\", \"action\":\"insert_node|replace|remove\",\n     \"target\":\"node_id 或 技术id\", \"route_to\":\"identifier\",\n     \"evidence_span\":{\"sentence_id\":0}, \"confidence\":0.7, \"reason\":\"≤25字关键判据\"}\n  ]\n}"
head: '# 显式节点核对 (报告: {{DOC_ID}})'
sec_1: '## (1) 原始报告 (逐句, 索引即 sentence_id) —— 唯一真相基准'
sec_2: '## (2) 还原报告 R'' (仅作辅助参考: 把当前图读出来的; 真正任务是下面逐个质询)'
sec_3: "## (3) 节点质询清单 (对【每一个】N# 都必须答一条: 原文支持该动作吗?)\n   判法: 只看显式节点(obs)。原文任一句明写该动作=keep; 全文找不到支持=OBD/remove(幻觉); 证据句其实是别的技术=OBD/replace。"
sec_multi: "## (3.5) 同技术多实例质询 (下列每组是同一父技术的≥2 个节点)\n   ★★【默认全部 keep】: 同一父技术的多节点【绝大多数是不同实例】(不同阶段/对象/信道), 一律保留。判 object 异同极不可靠(写命令vs启agent、解码vs解密、多C2信道、不同载荷 常被误判重复), 所以本步【不靠你自由判重复来删】。\n   ★【仅两种有据情况可 remove, 其余一律 keep】: (a)【程序自执行误标 T1059】——该 T1059 节点的 object 是【独立可执行程序本体】(具名.exe/.dll/dropper/被下载的PE/释放的组件, 而非 powershell/cmd/脚本/命令), action 是 launched/executed 一个程序——这不是命令脚本解释器, remove(reason 写'程序自执行非T1059'); (b)【同句铁重复】——两节点 sentence_id 完全相同 且 object 是同一个具体文件名/命令串, remove 多余的。\n   ★【禁 remove】: 跨父技术(根本不是同技术别拿来比)、不同阶段/对象/信道的多实例、object 是 powershell/脚本/命令的 T1059——全 keep。\n   ★宁可漏删不误删: 删节点连带删它所有边(误删不同实例=丢真边崩图)。除上面(a)(b)两种有据情况, 拿不准一律 keep。"
sec_node_mem: '## 节点易错提醒 (长期记忆, 仅供参考避免技术误标/误判重复, 不要无中生有)'
sec_5: '## (4) 图结构画像 (无 gold 结构信号, 仅用于调整注意力, 不替代原文判断)'
prof_density: '- 边密度 density = {{DENSITY}} (= 边数/节点数)'
prof_sparse: '- 该图被判为【稀疏】(density<0.8): 可能有动作漏抽, 找漏节点(insert_node)要格外用力。'
prof_normal: '- 该图密度正常: 现有节点核对 + 多实例去重 + 找漏节点 三遍都做。'
prof_hub: '- 高出度 hub(仅供参考, 本步不判边): {{HUBS}}'
prof_weak: '- 弱依据边(仅供参考, 本步不判边): {{WEAK}}'
tail: "【质询协议 · 必须照做, 逐节点判决不是阅读理解】\n第一遍·核现有节点: 对 (3) 每个 N# 回原文核对——有这动作吗? 有=跳过; 凭空无支持=OBD/remove(幻觉); 证据句其实是别的技术=OBD/replace。\n第二遍·多实例(★默认全 keep): 对 (3.5) 每组, 默认判不同实例【全 keep】; 仅当两节点是同一具体物在同一/相邻句被重复抽(object核心名词同一文件名/命令串 且 sid相同或紧邻)才 remove, reason点明那个相同具体物。写命令vs启agent、解码vs解密、多阶段载荷、多C2信道=不同实例禁remove。★误删连带丢边崩图, 宁可漏删。\n第三遍·找漏节点(★逐条必答, 这是本步重点): 若有【找漏节点提示区】, 对其中【每一条】疑似漏抽必须答一次——回原文核对该证据句是否确含该技术的攻击动作: 确含且图里母技术层面没有→OBD/insert_node 补(target=该技术id); 不含/只是修饰→不补并跳过。然后再顺原文(1)扫其他明写但漏抽的动作补。【这一遍要积极补, 别只删不补】。\n【召回优先】拿不准的删要压低confidence, 但找漏该补的要给高confidence。每条 finding 带原文 evidence_span。按 system JSON 输出。"
