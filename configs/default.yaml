seed: 42

base_url: "https://api.deepseek.com/v1"
model: "deepseek-chat"

identifier_self_consistency: 1

reasoner_temperature: 0.0
reasoner_self_consistency: 1
reasoner_require_anchor: true
reasoner_hub_priority: false

verifier_missing_k: 1
verifier_missing_thresh: 1

thinking: false
enable_verify: true
enable_route_back: true
route_back_mode: "adjudicate"
route_back_conf_floor: 0.5
apply_missing_edges: true
enable_memory: true

# ④ graph-level structure repair (global perspective)
enable_structure_repair: true
root_late_tactic_cutoff: "TA0005"          # a root at this tactic phase or later is illegitimate
structure_drop_unsupported_isolated: true   # deterministic safety net: drop nodes left isolated
